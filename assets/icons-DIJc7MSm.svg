<svg xmlns="http://www.w3.org/2000/svg" style="display:none">

  <!-- Cove logo leaf -->
  <symbol id="icon-cove-logo" viewBox="0 0 28 28" fill="none">
    <path d="M14 24V12" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M14 18c-5 0-8-3.5-8-8.5 5 0 8 3.5 8 8.5z" fill="currentColor" opacity="0.9"/>
    <path d="M14 15c5 0 8-3.5 8-8.5-5 0-8 3.5-8 8.5z" fill="currentColor" opacity="0.9"/>
  </symbol>

  <!-- Friend Groups: people/crew -->
  <symbol id="icon-group" viewBox="0 0 48 48" fill="none">
    <circle cx="16" cy="14" r="5" stroke="currentColor" stroke-width="2.5"/>
    <circle cx="32" cy="14" r="5" stroke="currentColor" stroke-width="2.5"/>
    <path d="M6 36c0-5.523 4.477-10 10-10s10 4.477 10 10" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M28 32c1.5-3.5 5-6 8-6 5.523 0 10 4.477 10 10" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
  </symbol>

  <!-- Trip Planning: map pin + plane -->
  <symbol id="icon-trip" viewBox="0 0 48 48" fill="none">
    <path d="M24 6C17.925 6 13 10.925 13 17c0 7.875 11 21 11 21s11-13.125 11-21c0-6.075-4.925-11-11-11z" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>
    <circle cx="24" cy="17" r="3.5" fill="currentColor" opacity="0.5"/>
    <circle cx="24" cy="17" r="3.5" stroke="currentColor" stroke-width="2"/>
    <path d="M8 40h32" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  </symbol>

  <!-- Shared Expenses: split receipt -->
  <symbol id="icon-split" viewBox="0 0 48 48" fill="none">
    <rect x="12" y="8" width="24" height="32" rx="3" stroke="currentColor" stroke-width="2.5"/>
    <path d="M18 16h12M18 22h12M18 28h7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="33" cy="34" r="7" fill="currentColor" opacity="0.15"/>
    <circle cx="33" cy="34" r="7" stroke="currentColor" stroke-width="2"/>
    <path d="M33 30v8M30.5 32h3.5a1.5 1.5 0 0 1 0 3h-2a1.5 1.5 0 0 0 0 3H35" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
  </symbol>

  <!-- Relationship Maintenance: pulse / heartbeat -->
  <symbol id="icon-pulse" viewBox="0 0 48 48" fill="none">
    <path d="M6 24h8l4-10 6 20 4-14 3 7 3-3h8" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M24 38c-1-1-10-7-10-14a10 10 0 0 1 10-9 10 10 0 0 1 10 9c0 7-9 13-10 14z" stroke="currentColor" stroke-width="2" opacity="0.3"/>
  </symbol>

  <!-- Memory Archive: photo / album -->
  <symbol id="icon-memory" viewBox="0 0 48 48" fill="none">
    <rect x="8" y="12" width="32" height="26" rx="3" stroke="currentColor" stroke-width="2.5"/>
    <circle cx="18" cy="22" r="3.5" stroke="currentColor" stroke-width="2"/>
    <path d="M8 32l8-7 6 5 5-4 13 8" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M16 12V8M24 12V7M32 12V9" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  </symbol>

</svg>
